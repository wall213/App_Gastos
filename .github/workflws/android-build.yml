name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Instalar EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 5. Login en Expo usando token
      - name: Login to Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6. Ejecutar build APK
      - name: Build APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 7. Obtener URL del último build
      - name: Get build info
        id: build_info
        run: |
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          BUILD_URL=$(echo $BUILD_INFO | jq -r '.[0].artifacts.buildUrl')
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "APK URL: $BUILD_URL"

      # 8. Descargar APK
      - name: Download APK
        run: |
          curl -L "$BUILD_URL" -o app-release.apk

      # 9. Subir APK como artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk

      # 10. Crear Release automática
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}